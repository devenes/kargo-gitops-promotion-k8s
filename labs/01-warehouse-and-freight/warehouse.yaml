# Warehouse defines what artifacts Kargo should track
# It subscribes to container images and Git repositories
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: demo-app
  namespace: kargo-lab
spec:
  # How often to check for new artifacts
  interval: 5m
  
  # Subscriptions define what to track
  subscriptions:
  
  # Subscribe to Git repository only.
  # Image tracking is disabled because Docker Hub is rate-limited on this cluster
  # and the internal registry is not accessible to Kargo without TLS configuration.
  # The deployment image is pinned directly in base/deployment.yaml.
  - git:
      repoURL: https://github.com/devenes/kargo-gitops-promotion-k8s
      branch: master
      
      # Optional: Include only specific paths
      # includePaths:
      # - stages/
      # - base/
      
      # Optional: Exclude specific paths
      # excludePaths:
      # - docs/
      # - "*.md"

