# Kargo Stage for frontend production environment
# Receives Freight from the frontend-uat stage (MANUAL promotion required)
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: frontend-prod
  namespace: kargo-lab
  labels:
    environment: prod
    app: frontend
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: frontend-app
    sources:
      stages:
      - frontend-uat

  promotionTemplate:
    spec:
      steps:

      # Step 1: Clone Git repositories
      - uses: git-clone
        config:
          repoURL: https://github.com/devenes/kargo-gitops-promotion-k8s
          checkout:
          - branch: master
            path: ./src
          - branch: stage/frontend-prod
            create: true
            path: ./out

      # Step 2: Clear the output directory
      - uses: git-clear
        config:
          path: ./out

      # Step 3: Build Kustomize manifests
      # Production uses 3 replicas (configured in frontend/stages/prod/kustomization.yaml)
      - uses: kustomize-build
        config:
          path: ./src/frontend/stages/prod
          outPath: ./out

      # Step 4: Commit changes to Git
      - uses: git-commit
        config:
          path: ./out
          message: "chore: promote frontend to prod"

      # Step 5: Push changes to stage/frontend-prod branch
      - uses: git-push
        config:
          path: ./out
          targetBranch: stage/frontend-prod

      # Step 6: Update ArgoCD Application
      - uses: argocd-update
        config:
          apps:
          - name: frontend-prod
            namespace: argocd
