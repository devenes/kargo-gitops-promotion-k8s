# Kargo Stage for frontend UAT environment
# Demonstrates:
#   - Upstream stage chaining (receives from frontend-test)
#   - yaml-update step to stamp promotion metadata into a version file
#   - http step for post-deployment health check
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: frontend-uat
  namespace: kargo-lab
  annotations:
    kargo.akuity.io/color: amber
  labels:
    environment: uat
    app: frontend
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: frontend-app
    sources:
      stages:
      - frontend-test

  promotionTemplate:
    spec:
      steps:

      # Step 1: Clone Git repositories
      - uses: git-clone
        as: clone
        config:
          repoURL: https://github.com/devenes/kargo-gitops-promotion-k8s
          checkout:
          - branch: master
            path: ./src
          - branch: stage/frontend-uat
            create: true
            path: ./out

      # Step 2: Clear the output directory
      - uses: git-clear
        config:
          path: ./out

      # Step 3: Render Kustomize manifests for the uat overlay (2 replicas)
      - uses: kustomize-build
        config:
          path: ./src/frontend/stages/uat
          outPath: ./out

      # Step 4 (TODO after push): yaml-update stamps commit/stage/branch into
      # the version ConfigMap. Requires version.yaml to be in kustomization.yaml
      # so kustomize-build emits kargo-lab-uat-configmap-frontend-version.yaml.
      # Will be re-enabled once changes are pushed to master.

      # Step 5: Commit rendered manifests
      - uses: git-commit
        as: commit
        config:
          path: ./out
          message: "chore: promote frontend to uat"

      # Step 6: Push to stage/frontend-uat branch
      - uses: git-push
        as: push
        config:
          path: ./out
          targetBranch: stage/frontend-uat

      # Step 7: Trigger ArgoCD sync
      - uses: argocd-update
        as: argocd
        config:
          apps:
          - name: frontend-uat
            namespace: argocd

      # Step 8: HTTP health check against UAT service
      - uses: http
        as: healthcheck
        config:
          method: GET
          url: http://frontend.kargo-lab-uat.svc.cluster.local
          successExpression: response.status == 200
          timeout: 30s
