# ArgoCD Application for test environment
# This Application is authorized to be managed by Kargo via the annotation
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-test
  namespace: argocd
  annotations:
    # CRITICAL: This annotation authorizes Kargo to update this Application
    # Format: <project-name>:<stage-name>
    kargo.akuity.io/authorized-stage: kargo-lab:test
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: test
    app.kubernetes.io/managed-by: kargo
spec:
  # ArgoCD project (use 'default' for simplicity)
  project: default
  
  # Source configuration
  source:
    # Git repository URL
    repoURL: https://github.com/devenes/kargo-gitops-promotion-k8s
    
    # Target branch - Kargo will create and manage this branch
    targetRevision: stage/test
    
    # Path to Kustomize overlay
    path: stages/test
  
  # Destination configuration
  destination:
    # Deploy to the same cluster where ArgoCD is running
    server: https://kubernetes.default.svc
    
    # Target namespace
    namespace: kargo-lab-test
  
  # Sync policy
  syncPolicy:
    # Automated sync - ArgoCD will automatically deploy changes
    automated:
      # Prune resources that are no longer defined in Git
      prune: true
      
      # Self-heal - automatically sync when cluster state drifts
      selfHeal: true
      
      # Allow empty - permit apps with no resources
      allowEmpty: false
    
    # Sync options
    syncOptions:
      # Create namespace if it doesn't exist
      - CreateNamespace=true
      
      # Validate resources before applying
      - Validate=true
      
      # Use server-side apply
      - ServerSideApply=true
    
    # Retry configuration
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  # Ignore differences in certain fields
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas

