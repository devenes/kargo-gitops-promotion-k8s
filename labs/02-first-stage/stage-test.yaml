# Kargo Stage for test environment
# This Stage receives Freight from the Warehouse and promotes it automatically
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: test
  namespace: kargo-lab
  labels:
    environment: test
spec:
  # Define what Freight this Stage should receive
  requestedFreight:
  - origin:
      # Request Freight from the demo-app Warehouse
      kind: Warehouse
      name: demo-app
    sources:
      # Receive Freight directly from the Warehouse
      direct: true
  
  # Promotion template defines how to promote Freight to this Stage
  promotionTemplate:
    spec:
      steps:
      
      # Step 1: Clone Git repositories
      - uses: git-clone
        config:
          # Repository to clone
          repoURL: https://github.com/devenes/kargo-gitops-promotion-k8s
          
          # Checkout multiple branches
          checkout:
          - branch: master
            path: ./src
          
          # Clone/create stage/test branch (target for this stage)
          - branch: stage/test
            create: true  # Create branch if it doesn't exist
            path: ./out
      
      # Step 2: Clear the output directory
      # This ensures we start with a clean slate
      - uses: git-clear
        config:
          path: ./out
      
      # Step 3: Build Kustomize manifests
      - uses: kustomize-build
        config:
          path: ./src/stages/test
          outPath: ./out

      # Step 4: Commit changes to Git
      - uses: git-commit
        config:
          path: ./out
          message: "chore: promote to test"
      
      # Step 6: Push changes to stage/test branch
      - uses: git-push
        config:
          # Path to push
          path: ./out
          
          # Target branch
          targetBranch: stage/test
      
      # Step 7: Update ArgoCD Application
      - uses: argocd-update
        config:
          apps:
          - name: demo-app-test
            namespace: argocd
          - name: db-test
            namespace: argocd

