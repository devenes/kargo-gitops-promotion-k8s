# ArgoCD Application for UAT environment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app-uat
  namespace: argocd
  annotations:
    # Authorize Kargo to update this Application
    kargo.akuity.io/authorized-stage: kargo-lab:uat
  labels:
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/instance: uat
    app.kubernetes.io/managed-by: kargo
spec:
  project: default
  
  source:
    repoURL: https://github.com/devenes/kargo-gitops-promotion-k8s
    targetRevision: stage/uat
    path: .
  
  destination:
    server: https://kubernetes.default.svc
    namespace: kargo-lab-uat
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    
    syncOptions:
      - CreateNamespace=true
      - Validate=true
      - ServerSideApply=true
    
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas

