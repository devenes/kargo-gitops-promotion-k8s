name: CI - Validation

on:
  push:
    branches: [main, stage/*]
  pull_request:
    branches: [main]

jobs:
  yaml-lint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint -c .yamllint.yml \
            infrastructure/ \
            base/ \
            stages/ \
            labs/ \
            || true

  shellcheck:
    name: Shell Script Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          find . -name "*.sh" -type f -exec shellcheck {} + || true

  kustomize-build:
    name: Kustomize Build Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.0.0"

      - name: Validate base
        run: kustomize build base

      - name: Validate test stage
        run: kustomize build stages/test

      - name: Validate uat stage
        run: kustomize build stages/uat

      - name: Validate prod stage
        run: kustomize build stages/prod

  validate-manifests:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Validate infrastructure manifests
        run: |
          kubectl apply --dry-run=client -f infrastructure/argocd/namespace.yaml
          kubectl apply --dry-run=client -f infrastructure/argocd/route.yaml
          kubectl apply --dry-run=client -f infrastructure/cert-manager/namespace.yaml
          kubectl apply --dry-run=client -f infrastructure/kargo/namespace.yaml
          kubectl apply --dry-run=client -f infrastructure/kargo/route.yaml

      - name: Validate lab manifests
        run: |
          kubectl apply --dry-run=client -f labs/01-warehouse-and-freight/
          kubectl apply --dry-run=client -f labs/02-first-stage/argocd-app-test.yaml
          kubectl apply --dry-run=client -f labs/02-first-stage/stage-test.yaml
          kubectl apply --dry-run=client -f labs/03-multi-stage-pipeline/

  summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [yaml-lint, shellcheck, kustomize-build, validate-manifests]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "✅ All validation checks completed"
          echo "Note: This CI only validates syntax and structure"
          echo "Actual cluster deployment must be done locally"
