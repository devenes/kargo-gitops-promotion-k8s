apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: demo-app-test

namespace: kargo-lab-test

resources:
  - ../../base

commonLabels:
  environment: test
  stage: test

namePrefix: test-

# Test environment specific configurations
replicas:
  - name: demo-app
    count: 2

# Add test-specific annotations
commonAnnotations:
  kargo.akuity.io/stage: test

# Patch Route backend: namePrefix renames the Service to test-demo-app
# but does NOT update spec.to.name inside the Route manifest automatically
patches:
- patch: |-
    - op: replace
      path: /spec/to/name
      value: test-demo-app
  target:
    kind: Route
    name: demo-app

