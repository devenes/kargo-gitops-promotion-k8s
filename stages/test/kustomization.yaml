apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: demo-app-test

namespace: kargo-lab-test

resources:
  - ../../base

commonLabels:
  environment: test
  stage: test

namePrefix: test-

# Test environment specific configurations
replicas:
  - name: demo-app
    count: 2

# Add test-specific annotations
commonAnnotations:
  kargo.akuity.io/stage: test

