apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: demo-app-prod

namespace: kargo-lab-prod

resources:
  - ../../base

commonLabels:
  environment: prod
  stage: prod

namePrefix: prod-

# Production environment specific configurations
# Higher replica count for production
replicas:
  - name: demo-app
    count: 3

# Add production-specific annotations
commonAnnotations:
  kargo.akuity.io/stage: prod

# Patch Route backend: namePrefix renames the Service to prod-demo-app
# but does NOT update spec.to.name inside the Route manifest automatically
patches:
- patch: |-
    - op: replace
      path: /spec/to/name
      value: prod-demo-app
  target:
    kind: Route
    name: demo-app

