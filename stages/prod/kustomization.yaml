apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: demo-app-prod

namespace: kargo-lab-prod

resources:
  - ../../base

commonLabels:
  environment: prod
  stage: prod

namePrefix: prod-

# Production environment specific configurations
# Higher replica count for production
replicas:
  - name: demo-app
    count: 3

# Add production-specific annotations
commonAnnotations:
  kargo.akuity.io/stage: prod

