apiVersion: route.openshift.io/v1
kind: Route
metadata:
  annotations:
    kargo.akuity.io/stage: prod
  labels:
    app: demo-app
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: kargo
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/part-of: kargo-learning-lab
    environment: prod
    stage: prod
  name: prod-demo-app
  namespace: kargo-lab-prod
spec:
  port:
    targetPort: http
  tls:
    insecureEdgeTerminationPolicy: Redirect
    termination: edge
  to:
    kind: Service
    name: demo-app
    weight: 100
  wildcardPolicy: None
