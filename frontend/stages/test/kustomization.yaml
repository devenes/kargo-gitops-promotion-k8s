apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kargo-lab-test
commonLabels:
  environment: test
  stage: test
resources:
- ../../base
patches:
- patch: |-
    - op: replace
      path: /data/index.html
      value: |
        <!DOCTYPE html>
        <html>
        <head><title>Frontend App - Test</title></head>
        <body>
          <h1>Frontend App</h1>
          <p>Environment: <strong>test</strong></p>
        </body>
        </html>
  target:
    kind: ConfigMap
    name: frontend-html
