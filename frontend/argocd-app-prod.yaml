apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-prod
  namespace: argocd
  annotations:
    kargo.akuity.io/authorized-stage: kargo-lab:frontend-prod
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/instance: prod
    app.kubernetes.io/managed-by: kargo
spec:
  project: default
  source:
    repoURL: https://github.com/devenes/kargo-gitops-promotion-k8s
    targetRevision: stage/frontend-prod
    path: .
  destination:
    server: https://kubernetes.default.svc
    namespace: kargo-lab-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
