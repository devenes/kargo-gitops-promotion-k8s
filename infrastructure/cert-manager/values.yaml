# Helm values for cert-manager v1.16.3
# Install with: helm install cert-manager jetstack/cert-manager --version v1.16.3 -f values.yaml

# Enable CRD installation
crds:
  enabled: true

# Resource limits for production readiness
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

webhook:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

cainjector:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

