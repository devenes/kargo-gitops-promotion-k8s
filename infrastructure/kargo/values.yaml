# Helm values for Kargo v1.9.3
# Install with: helm install kargo oci://ghcr.io/akuity/kargo-charts/kargo --version 1.9.3 -f values.yaml

# API configuration
api:
  # Admin account for learning purposes
  # In production, use OIDC authentication instead
  adminAccount:
    enabled: true
    # BCrypt hash of "admin" password
    passwordHash: "$2a$10$Zrhhie4vLz5ygtVSaif6o.qN36jgs6vjtMBdM6yrU1FOeiAAMMxOm"
    tokenSigningKey: my-signing-key
  
  # Service configuration
  service:
    type: ClusterIP
    port: 443

# Controller configuration
controller:
  # Resource limits
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Webhooks configuration
webhooksServer:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Management controller
managementController:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Garbage collector
garbageCollector:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

