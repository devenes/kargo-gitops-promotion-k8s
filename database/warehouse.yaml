# Kargo Warehouse for database artifacts
# Tracks changes to the database/ directory on the master branch
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: db
  namespace: kargo-lab
spec:
  interval: 5m
  subscriptions:
  - git:
      repoURL: https://github.com/devenes/kargo-gitops-promotion-k8s
      branch: master
      includePaths:
      - database/
