apiVersion: v1
kind: Service
metadata:
  name: demo-app
  labels:
    app: demo-app
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app: demo-app
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  sessionAffinity: None

