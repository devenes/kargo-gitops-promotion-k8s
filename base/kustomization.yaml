apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: demo-app-base

resources:
  - deployment.yaml
  - service.yaml
  - route.yaml

commonLabels:
  app.kubernetes.io/managed-by: kargo
  app.kubernetes.io/part-of: kargo-learning-lab

images:
  - name: nginx
    newName: nginx
    newTag: 1.25-alpine

