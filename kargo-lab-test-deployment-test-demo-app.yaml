apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kargo.akuity.io/stage: test
  labels:
    app: demo-app
    app.kubernetes.io/component: web
    app.kubernetes.io/managed-by: kargo
    app.kubernetes.io/name: demo-app
    app.kubernetes.io/part-of: kargo-learning-lab
    environment: test
    stage: test
  name: test-demo-app
  namespace: kargo-lab-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
      app.kubernetes.io/managed-by: kargo
      app.kubernetes.io/part-of: kargo-learning-lab
      environment: test
      stage: test
  template:
    metadata:
      annotations:
        kargo.akuity.io/stage: test
      labels:
        app: demo-app
        app.kubernetes.io/managed-by: kargo
        app.kubernetes.io/part-of: kargo-learning-lab
        environment: test
        stage: test
        version: 1.0.0
    spec:
      containers:
      - image: nginx:1.25-alpine
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        name: nginx
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 101
